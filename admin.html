<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>誠創科技網站後台</title><link rel="stylesheet" href="assets/css/admin.css"></head><body class="admin-page">
<div id="loginScreen" class="login-screen"><div class="login-card"><img id="loginLogo" src="assets/images/logo.png" class="login-logo"><h1>後台登入</h1><p>請輸入帳號密碼後進入網站管理後台。</p><label>帳號<input id="loginUser" autocomplete="username" placeholder="admin"></label><label>密碼</label><div class="password-wrap"><input id="loginPass" type="password" autocomplete="current-password"><button type="button" id="toggleLoginPass" class="eye-btn">👁</button></div><button id="loginBtn">登入後台</button><div id="loginMsg" class="login-msg"></div></div></div>
<div id="adminApp" class="admin-app locked"><header class="admin-header"><div><h1>誠創科技網站後台</h1><p>可編輯區塊、顯示/隱藏、排序、預覽與儲存。</p></div><div class="top-actions"><button id="previewBtn" class="preview-action">預覽</button><a href="index.html" target="_blank">開啟首頁</a><button id="saveBtn">儲存修改</button><button id="logoutBtn" class="logout-action">登出</button></div></header>
<main class="admin-layout"><aside>
<button data-tab="basic" class="active">基本資料</button><button data-tab="header">頁首欄位</button><button data-tab="footer">頁尾顯示</button><button data-tab="security">登入密碼</button><button data-tab="users">使用者權限</button><button data-tab="editEntry">編輯入口</button><button data-tab="appearance">手機/圖片顯示</button><button data-tab="hero">主視覺</button><button data-tab="services">服務項目</button><button data-tab="cases">成功案例</button><button data-tab="partners">關係企業</button><button data-tab="news">最新消息</button><button data-tab="faq">常見問題</button><button data-tab="form">表單設定</button><button data-tab="images">圖片管理</button><button data-tab="backup">備份/還原</button>
</aside><section class="panel"><div id="adminContent"></div></section></main></div>
<div id="previewModal" class="preview-modal"><div class="preview-toolbar"><strong>網站預覽</strong><span>目前為暫存預覽，尚未儲存。</span><button id="closePreviewBtn">關閉預覽</button></div><iframe id="previewFrame"></iframe></div>

<script>
(function(){
  function bind(){
    var pass=document.getElementById("loginPass"), eye=document.getElementById("toggleLoginPass");
    if(pass&&eye&&!eye.dataset.quickBound){
      eye.dataset.quickBound="1";
      eye.addEventListener("click",function(){
        pass.type=pass.type==="password"?"text":"password";
        eye.textContent=pass.type==="password"?"👁":"🙈";
      });
    }
  }
  if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",bind)}else{bind()}
})();
</script>

<script>
(function(){
  function syncLoginLogo(){
    try{
      var imgs=JSON.parse(localStorage.getItem("cc_full_site_images")||"{}");
      var logo=imgs.logo||imgs.siteLogo||imgs.headerLogo;
      var el=document.getElementById("loginLogo");
      if(el && logo){ el.src=logo; }
    }catch(e){}
  }
  if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",syncLoginLogo);
  }else{
    syncLoginLogo();
  }
})();
</script>
<script src="assets/js/data.js?v=00616"></script><script src="assets/js/admin.js?v=00616"></script></body></html>
