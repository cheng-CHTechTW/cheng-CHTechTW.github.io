name = "ch-cms-v2"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./"

[[d1_databases]]
binding = "DB"
database_name = "ch-cms-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"

[[r2_buckets]]
binding = "R2"
bucket_name = "ch-cms-media"

[vars]
JWT_SECRET = "REPLACE_WITH_SECURE_RANDOM_SECRET_MIN_32_CHARS"
R2_PUBLIC_URL = "https://media.chuang-c.com"
ALLOWED_ORIGIN = "https://chuang-c.com"
GITHUB_TOKEN = "REPLACE_WITH_GITHUB_PAT"

# 本機開發
[dev]
port = 8788
local_protocol = "http"
